<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Facturación</title>
  <link rel="stylesheet" href="./css/estilos.css" />
</head>
<body>

  <!-- BARRA SUPERIOR -->
  <header class="barra-superior">
    <div class="logo">🧾 SISIN</div>
    <input type="text" placeholder="Buscar producto..." class="buscador" id="buscador">
    <nav class="nav">
      <button><a href="inventario.html">Inventario</a></button>
      <button><a href="factura.html">Factura</a></button>
      <button id="Cerrar">Cerrar sesión</button>
    </nav>
    <div class="usuario">👤</div>
  </header>

  <main class="contenedor">
    <!-- Productos -->
    <section class="productos" id="productos"></section>
    <div class="AgregarProductos">
      <h3>Agregar nuevo producto</h3>
      <form id="formProducto" enctype="multipart/form-data">
        <input name="nombre" placeholder="Nombre del producto" required><br>
        <input name="descripcion" placeholder="Descripción"><br>
        <input name="precio" type="number" placeholder="Precio" required><br>
        <input type="date" name="fechaVencimiento" required><br>
        <input type="number" name="cantidad" placeholder="Cantidad disponible" required><br>
        <input name="imagen" type="file" accept="image/*"><br>
        <button type="submit"><h4>Agregar Producto</h4></button>
      </form>
    </div>
  </main>


<div id="modalEditar" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000099; justify-content:center; align-items:center; z-index:1000;">
  <div style="background:var(--bg-card); padding:1.5rem; border-radius:12px; width:90%; max-width:420px; max-height:90vh; overflow-y:auto; position:relative; border:1px solid var(--border-color);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h3 style="margin:0;">✏️ Editar Producto</h3>
      <button type="button" onclick="cerrarModal()" style="background:none;border:none;color:var(--text-secondary);font-size:1.4rem;cursor:pointer;line-height:1;">×</button>
    </div>
    <form id="formEditar" enctype="multipart/form-data" style="display:flex; flex-direction:column; gap:0.6rem;">
      <input type="hidden" id="editarId" name="editarId">
      <label style="font-size:0.8rem;color:var(--text-secondary);">Nombre</label>
      <input id="editarNombre" name="nombre" placeholder="Nombre" required>
      <label style="font-size:0.8rem;color:var(--text-secondary);">Descripción</label>
      <input id="editarDescripcion" name="descripcion" placeholder="Descripción">
      <label style="font-size:0.8rem;color:var(--text-secondary);">Precio</label>
      <input id="editarPrecio" name="precio" type="number" step="0.01" placeholder="Precio" required>
      <label style="font-size:0.8rem;color:var(--text-secondary);">Fecha de Vencimiento</label>
      <input id="editarFechaVencimiento" name="fechaVencimiento" type="date" required>
      <label style="font-size:0.8rem;color:var(--text-secondary);">Cantidad</label>
      <input id="editarCantidad" name="cantidad" type="number" placeholder="Cantidad" required>
      <label style="font-size:0.8rem;color:var(--text-secondary);">Nueva Imagen (Opcional)</label>
      <input id="editarImagen" name="imagen" type="file" accept="image/*" style="color:var(--text-secondary);">
      <div style="display:flex; gap:8px; margin-top:0.5rem;">
        <button type="submit" style="flex:1;">Guardar</button>
        <button type="button" onclick="cerrarModal()" style="flex:1;background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);">Cancelar</button>
      </div>
    </form>
  </div>
</div>

 
  <script src="js/logout.js"></script>
  <script src="js/inventario.js"></script>

  <!-- Modal de edición -->


</body>
</html>
